name: Deploy to AWS VM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build and push image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: meta
        run: |
          image="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy over SSH
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AWS_VM_HOST }}
          username: ${{ secrets.AWS_VM_USER }}
          key: ${{ secrets.AWS_VM_SSH_KEY }}
          port: ${{ secrets.AWS_VM_SSH_PORT || 22 }}
          envs: DEPLOY_SHA,BACKEND_IMAGE,GHCR_USER,GHCR_TOKEN,APP_DIR
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${APP_DIR:-$HOME/Resume-Refiner-Backend}"
            cd "$APP_DIR"
            git fetch --all --prune
            git checkout main
            git reset --hard "$DEPLOY_SHA"
            chmod +x scripts/deploy.sh scripts/ensure-shared-network.sh
            ./scripts/ensure-shared-network.sh || true
            ./scripts/deploy.sh
        env:
          DEPLOY_SHA: ${{ github.sha }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.image }}:${{ github.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_DIR: ${{ secrets.AWS_VM_APP_DIR }}
