worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 5m;

    upstream django {
        server web:8000;
    }

    server {
        listen 80;
        server_name _;

        # Security headers (set only at server level — location add_header would override these)
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Generated admin / DRF static assets (collectstatic)
        location /static/ {
            alias /staticfiles/;
            expires 7d;
            access_log off;
        }

        # User uploads (profile pictures) — named volume shared with web
        location /media/ {
            alias /media/;
            expires 7d;
            access_log off;
        }

        location /api/ {
            proxy_pass http://django;
            proxy_http_version 1.1;

            # Fixed Host so Django ALLOWED_HOSTS stays stable behind Elastic IP
            proxy_set_header Host backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Preserve Clerk / Svix webhook verification headers
            proxy_set_header Authorization $http_authorization;
            proxy_set_header svix-id $http_svix_id;
            proxy_set_header svix-timestamp $http_svix_timestamp;
            proxy_set_header svix-signature $http_svix_signature;

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_redirect off;
        }

        location /admin/ {
            proxy_pass http://django;
            proxy_http_version 1.1;
            proxy_set_header Host backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }
    }
}
