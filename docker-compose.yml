version: '3.8'

# Local dev only — Postgres (Supabase) and Redis (Redis Cloud) are external.
# Copy .env.example to .env and set cloud connection strings before starting.

services:
  # =============================================================================
  # Django Backend
  # =============================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resumeai-backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - generated_pdfs:/app/generated/pdfs
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      FORMATEX_API_KEY: ${FORMATEX_API_KEY:-}
      FORMATEX_API_BASE_URL: ${FORMATEX_API_BASE_URL:-https://api.formatex.io/api/v1}
      FORMATEX_ENGINE: ${FORMATEX_ENGINE:-auto}
      FORMATEX_TIMEOUT: ${FORMATEX_TIMEOUT:-120}
      FORMATEX_USE_SMART_COMPILE: ${FORMATEX_USE_SMART_COMPILE:-True}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =============================================================================
  # Celery Worker
  # =============================================================================
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resumeai-celery-worker
    command: celery -A config worker -l info -Q celery,resume_generation,maintenance
    volumes:
      - .:/app
      - generated_pdfs:/app/generated/pdfs
    env_file: .env
    environment:
      FORMATEX_API_KEY: ${FORMATEX_API_KEY:-}
      FORMATEX_API_BASE_URL: ${FORMATEX_API_BASE_URL:-https://api.formatex.io/api/v1}
      FORMATEX_ENGINE: ${FORMATEX_ENGINE:-auto}
      FORMATEX_TIMEOUT: ${FORMATEX_TIMEOUT:-120}
      FORMATEX_USE_SMART_COMPILE: ${FORMATEX_USE_SMART_COMPILE:-True}
    depends_on:
      - backend

  # =============================================================================
  # Celery Beat (Scheduler)
  # =============================================================================
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resumeai-celery-beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - backend

volumes:
  generated_pdfs:
