version: '3.8'

services:
  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  db:
    image: postgres:15-alpine
    container_name: resumeai-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Ports removed for security (internal access only)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Redis (Celery broker and cache)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: resumeai-redis
    # Ports removed for security (internal access only)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Django Backend
  # =============================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resumeai-backend
    # Override default gunicorn command for dev experience (hot reload)
    # For production, remove this command to use the Dockerfile's default CMD
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - generated_pdfs:/app/generated/pdfs
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =============================================================================
  # Celery Worker
  # =============================================================================
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resumeai-celery-worker
    command: celery -A config worker -l info -Q celery,resume_generation,maintenance
    volumes:
      - .:/app
      - generated_pdfs:/app/generated/pdfs
    env_file: .env
    depends_on:
      - backend
      - redis

  # =============================================================================
  # Celery Beat (Scheduler)
  # =============================================================================
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resumeai-celery-beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - backend
      - redis

  # =============================================================================
  # AI Agent Microservice (Stub)
  # =============================================================================
  agent:
    build:
      context: ./services/agent
      dockerfile: Dockerfile
    container_name: resumeai-agent
    env_file: .env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./services/agent:/app
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'uvicorn' /proc/1/cmdline || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =============================================================================
  # LaTeX Microservice
  # =============================================================================
  latex:
    build:
      context: ./services/latex
      dockerfile: Dockerfile
    container_name: resumeai-latex
    volumes:
      - generated_pdfs:/app/output
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'uvicorn' /proc/1/cmdline || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3



volumes:
  postgres_data:
  generated_pdfs: