# Render Blueprint — FREE TIER (all processes in one web service)
#
# Deploy: Render Dashboard → New → Blueprint → connect this repo
#
# Render does not offer free "background worker" service types. To run Celery on
# free tier, API + celery worker + celery beat all run inside resume-refiner-api
# via scripts/start-render-free.sh.
#
# Free tier limits:
#   - ~512MB RAM (concurrency=1, single gunicorn worker)
#   - Spins down after ~15 min idle (~30s cold start)
#   - Ephemeral disk (download PDFs promptly)
#
# Prerequisites: Supabase, Redis Cloud, NVIDIA, FormaTeX, Clerk keys below.

envVarGroups:
  - name: resume-refiner-env
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1,.onrender.com,resume-refiner-api-vulk.onrender.com
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_SSLMODE
        value: require
      - key: CELERY_TASK_TIME_LIMIT
        value: "420"
      - key: NVIDIA_MODEL
        value: nvidia/nemotron-3-super-120b-a12b
      - key: NVIDIA_API_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_REQUEST_TIMEOUT
        value: "180"
      - key: FORMATEX_API_BASE_URL
        value: https://api.formatex.io/api/v1
      - key: FORMATEX_ENGINE
        value: auto
      - key: FORMATEX_TIMEOUT
        value: "120"
      - key: FORMATEX_USE_SMART_COMPILE
        value: "True"
      - key: DATA_TTL_HOURS
        value: "24"
      - key: CLERK_JWKS_CACHE_TTL
        value: "3600"
      # --- REQUIRED: set every variable below in Render → Environment ---
      - key: DIRECT_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: FORMATEX_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWT_ISSUER
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false

services:
  # === Web (Django API) — free ===
  - type: web
    name: resume-refiner-api
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: /app/scripts/start-render-free.sh
    healthCheckPath: /api/v1/health
    # Migrations run in start-render-free.sh (preDeployCommand not supported on free tier)
    envVars:
      - fromGroup: resume-refiner-env

  # === Celery worker — logical service, runs inside resume-refiner-api (free) ===
  # Render has no free worker service type; start-render-free.sh starts the worker.
  # No separate Render service is created for this block.

  # === Celery beat — logical service, runs inside resume-refiner-api (free) ===
  # Same as above; beat is started by start-render-free.sh.
